name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting (warnings only)
        run: cargo fmt --all -- --check || true

      # osp-desktop is a Tauri (v2) app: building its binary pulls in
      # webkit2gtk / gtk-sys / glib-sys, which require system packages
      # (libglib2.0-dev, libgtk-3-dev, libwebkit2gtk-4.1-dev, ...). Those are
      # not available on a plain ubuntu runner and are unnecessary for a
      # headless PR gate — the desktop binary cannot run here anyway. It is
      # built locally / in a release workflow. CI covers the 4 library crates:
      # osp-core, osp-analyzer, osp-spike, osp-llm-runtime.
      - name: Build
        run: cargo build --workspace --verbose --exclude osp-desktop

      - name: Run tests
        run: cargo test --workspace --verbose --exclude osp-desktop

      - name: Build examples
        run: cargo build --workspace --examples --exclude osp-desktop
